<div class="settings-page">

    

    <div class="top-bar">

        <button
            class="back-btn"
            (click)="goDashboard()">

            ← Dashboard

        </button>

        <div class="settings-badge">

            ⚙️ Settings Center

        </div>

    </div>

    

    <div class="hero-card">

        <div>

            <h1>

                Settings & Preferences

            </h1>

            <p>

                Manage platform preferences and account settings

            </p>

        </div>

        <div class="hero-icon">

            ⚙️

        </div>

    </div>

    

    <div class="profile-card">

        <div class="avatar">

            👨‍💻

        </div>

        <div>

            <h2>

                Admin User

            </h2>

            <p>

                admin@portal.com

            </p>

            <span class="active-status">

                Active Session

            </span>

        </div>

    </div>

    

    <div class="settings-grid">

        <div class="setting-card">

            <h3>

                🌙 Dark Mode

            </h3>

            <p>

                Enable modern dark appearance

            </p>

            <button class="setting-btn">

                Enabled

            </button>

        </div>

        <div class="setting-card">

            <h3>

                🔔 Notifications

            </h3>

            <p>

                Receive alerts and updates

            </p>

            <button class="setting-btn">

                Active

            </button>

        </div>

        <div class="setting-card">

            <h3>

                🔒 Security

            </h3>

            <p>

                Multi-layer admin protection

            </p>

            <button class="setting-btn">

                Protected

            </button>

        </div>

    </div>

</div>
